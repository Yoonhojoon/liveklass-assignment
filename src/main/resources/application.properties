spring.application.name=demo
spring.datasource.url=jdbc:h2:file:./data/liveklass;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
notification.worker.enabled=true
notification.worker.poll-delay-ms=5000
notification.worker.batch-size=20
notification.worker.lock-ttl=10m
notification.retry.max-retries=3
notification.retry.backoffs=1m,5m,15m
